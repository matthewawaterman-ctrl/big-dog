<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Velion Loading Screen</title>
<!--
  VELION LOADING SCREEN — drop-in loader (chameleon blinks while you load).
  ------------------------------------------------------------------------
  HOW TO USE in another project:
    1. Copy the <style> block (the .vl-* rules) into your CSS.
    2. Copy the <div class="vl-loading"> ... </div> markup into your HTML,
       as the first thing inside <body>.
    3. When your app is ready, hide it. Simplest:
         document.querySelector('.vl-loading').classList.add('vl-hidden');
       (fades out over 0.4s, then stops receiving taps).
  NOTES:
    • The blink is pure CSS — it morphs an SVG eyelid's `d` path. No JS needed.
    • The eyelid is positioned over the eye on THIS art (left 23.7%, top 29.2%).
      If you swap the chameleon image, re-measure those two numbers.
    • To drop the "Velion" wordmark, delete the <img class="vl-word"> line.
    • Respects prefers-reduced-motion (blink + dots freeze).
-->
<style>
  html, body { height: 100%; margin: 0; }

  .vl-loading {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(circle at 50% 35%, #181230 0%, #0d0a22 60%, #07050f 100%);
    transition: opacity 0.4s ease;
  }
  .vl-loading.vl-hidden { opacity: 0; pointer-events: none; }

  .vl-cham-wrap { position: relative; width: clamp(150px, 32vw, 240px); }
  .vl-cham { display: block; width: 100%; height: auto; image-rendering: auto; }

  /* SVG eyelid overlay, positioned over the eye on the art.
     A body-green shape clipped to the eye circle; its curved lower edge
     (lash line) descends to close, so the iris peeks under it mid-blink. */
  .vl-eyelid {
    position: absolute;
    left: 23.7%; top: 29.2%;       /* eye centre on THIS art */
    width: 24%; aspect-ratio: 1;   /* ~2x the eye radius */
    transform: translate(-50%, -50%);
    overflow: visible; pointer-events: none;
  }
  .vl-lid-path {
    fill: #23371d;                       /* body green */
    stroke: #101c10; stroke-width: 1.2;  /* darker lash-line edge */
    animation: vlBlink 3.6s ease-in-out infinite;
  }
  @keyframes vlBlink {
    0%, 86%, 100% { d: path("M -50 -50 L 50 -50 L 50 -50 Q 0 -50 -50 -50 Z"); }  /* open */
    90%, 94%      { d: path("M -50 -50 L 50 -50 L 50  50 Q 0  72 -50  50 Z"); }  /* shut */
    98%           { d: path("M -50 -50 L 50 -50 L 50 -50 Q 0 -50 -50 -50 Z"); }  /* reopen */
  }

  .vl-word { width: clamp(200px, 44vw, 300px); height: auto; margin-top: 22px; }

  .vl-sub { margin-top: 18px; display: flex; gap: 6px; }
  .vl-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #8d8ac0;
    animation: vlDot 1.2s ease-in-out infinite;
  }
  .vl-dot:nth-child(2) { animation-delay: 0.2s; }
  .vl-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes vlDot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    .vl-lid-path, .vl-dot { animation: none; }
  }
</style>
</head>
