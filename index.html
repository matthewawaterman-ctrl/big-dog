<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG DOG — grey-box</title>
<style>
  html,body{margin:0;height:100%;background:#1b1f24;color:#e8eef3;
    font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden}
  #wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
  canvas{background:#2a2f36;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5);touch-action:none}
  #hint{font-size:12px;opacity:.6;letter-spacing:.3px}
  b{color:#fff}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="760" height="820"></canvas>
  <div id="hint"><b>WASD/Arrows</b> move · hold <b>SPACE</b> pee · <b>P</b> poop (trump) · <b>R</b> restart · <b>Esc</b> pause</div>
</div>
<script>
/* ============================================================
   BIG DOG — grey-box prototype
   Single question this answers: is mark/defend/refuel FUN?
   All feel-numbers live in TUNE. Change them, not the code.
   ============================================================ */

const TUNE = {
  ROUND_TIME:   120,   // sec. Bible default 3:00; 2:00 here for faster test iterations.
  FILL_RATE:    25,    // claim/sec added while peeing on own/neutral object
  DECAY_RATE:   2,     // claim/sec bled from any owned object (keeps map contestable)
  ERODE_RATE:   20,    // claim/sec removed from an ENEMY object before you can claim it
  PEE_DRAIN:    13,    // bladder/sec spent while peeing
  WATER_RATE:   34,    // bladder/sec refilled at home
  FOOD_TIME:    9,     // sec at home to regain 1 poop charge
  MOVE_SPEED:   168,   // px/sec
  VULN_SPEED:   0.55,  // speed multiplier when caught empty in enemy turf
  POOP_LOCK:    8,     // sec an object is locked from recapture after a poop
  MARK_RANGE:   40,    // px you must be within to affect an object
  HOME_RADIUS:  58,    // px refuel zone radius
  BLADDER_MAX:  100,
  POOP_MAX:     1,
  OBJ_PER_BLOCK:4,
};

// ---- colors / owners --------------------------------------------------------
const C = {
  bg:'#2a2f36', grid:'#3a414a', street:'#33383f',
  neutral:'#8a949e', home:'#7a5c3e',
  you:'#2e86de', ai1:'#e74c3c', ai2:'#e67e22',
  ink:'#e8eef3', dim:'#9aa6b2'
};
const OWNER_COLOR = { you:C.you, ai1:C.ai1, ai2:C.ai2, null:C.neutral };
const OWNER_NAME  = { you:'YOU', ai1:'RED', ai2:'ORANGE' };

// ---- layout -----------------------------------------------------------------
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const MAP_TOP = 60;                     // HUD strip height at top
const MAP_PX  = 700;                    // play-area square
const MAP_X   = (cv.width - MAP_PX)/2;  // left edge of map
const MAP_Y   = MAP_TOP;
const BLOCK   = MAP_PX/3;
const HOME    = { x: MAP_X + MAP_PX/2, y: MAP_Y + MAP_PX/2 };
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const now=()=>performance.now()/1000;

// ---- state ------------------------------------------------------------------
let objects=[], dogs=[], timeLeft=TUNE.ROUND_TIME, paused=false, over=false, lastT=0;
const keys={};

// instrumentation — this is the point: watch what the player DOES
let stats;

function freshStats(){ return {
  marks:0,           // objects you brought to 100 yours
  enemyContests:0,   // distinct enemy objects you eroded
  poops:0,
  retreats:0,        // refuel trips home with low bladder
  vulnSec:0,         // time caught empty in enemy turf
  farthest:0,        // farthest from home you ever pushed (px)
}; }

function blockIndexAt(x,y){
  const c=clamp(Math.floor((x-MAP_X)/BLOCK),0,2);
  const r=clamp(Math.floor((y-MAP_Y)/BLOCK),0,2);
  return r*3+c;
}

function makeObjects(){
  const arr=[]; let id=0;
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const bx=MAP_X+c*BLOCK, by=MAP_Y+r*BLOCK, isCenter=(r===1&&c===1);
    for(let k=0;k<TUNE.OBJ_PER_BLOCK;k++){
      // jitter inside block, keep margin; in center block keep clear of the doghouse
      let x,y,tries=0;
      do{
        x=bx+40+Math.random()*(BLOCK-80);
        y=by+40+Math.random()*(BLOCK-80);
        tries++;
      }while(isCenter && dist({x,y},HOME)<TUNE.HOME_RADIUS+34 && tries<30);
      const weight=1+Math.floor(Math.random()*3); // 1..3 (mailbox..car/tree)
      arr.push({id:id++, x, y, block:r*3+c, weight,
                claim:0, owner:null, lock:0, _contestedBy:{}});
    }
  }
  return arr;
}

function makeDogs(){
  const mk=(id)=>({id, x:HOME.x, y:HOME.y, vx:0, vy:0, face:0,
    bladder:TUNE.BLADDER_MAX, poop:TUNE.POOP_MAX, foodT:0,
    peeing:false, vulnerable:false,
    ai:{ state:'roam', target:null, think:0 }});
  return [ mk('you'), mk('ai1'), mk('ai2') ];
}

function reset(){
  objects=makeObjects();
  dogs=makeDogs();
  timeLeft=TUNE.ROUND_TIME;
  over=false; paused=false;
  stats=freshStats();
  lastT=now();
}

// ---- block ownership --------------------------------------------------------
function blockOwners(){
  const acc=Array.from({length:9},()=>({}));
  for(const o of objects){
    if(o.owner) acc[o.block][o.owner]=(acc[o.block][o.owner]||0)+o.weight;
  }
  return acc.map(m=>{
    let best=null,bv=0,tie=false;
    for(const k in m){ if(m[k]>bv){bv=m[k];best=k;tie=false;} else if(m[k]===bv) tie=true; }
    return (bv>0 && !tie)?best:null;
  });
}

function blockTally(owners){
  const t={you:0,ai1:0,ai2:0,null:0};
  for(const o of owners) t[o]++;
  return t;
}

// ---- core sim ---------------------------------------------------------------
function nearestObject(dog){
  let best=null,bd=1e9;
  for(const o of objects){ const d=dist(dog,o); if(d<bd){bd=d;best=o;} }
  return {o:best,d:bd};
}

function applyPee(dog,o,dt){
  if(o.lock>0 && o.owner!==dog.id) return;           // locked by trump: untouchable
  if(dog.bladder<=0) return;
  dog.bladder=clamp(dog.bladder-TUNE.PEE_DRAIN*dt,0,TUNE.BLADDER_MAX);
  if(o.owner===dog.id || o.owner===null){
    o.owner=dog.id;
    const before=o.claim;
    o.claim=clamp(o.claim+TUNE.FILL_RATE*dt,0,100);
    if(before<100 && o.claim>=100 && dog.id==='you') stats.marks++;
  }else{
    // enemy-owned: erode first
    if(dog.id==='you' && !o._contestedBy['you']){ o._contestedBy['you']=true; stats.enemyContests++; }
    o.claim-=TUNE.ERODE_RATE*dt;
    if(o.claim<=0){ o.claim=0; o.owner=null; }
  }
}

function tryPoop(dog){
  if(dog.poop<=0) return;
  const {o,d}=nearestObject(dog);
  if(!o || d>TUNE.MARK_RANGE) return;
  if(o.lock>0 && o.owner!==dog.id) return;
  o.owner=dog.id; o.claim=100; o.lock=TUNE.POOP_LOCK; dog.poop--;
  if(dog.id==='you') stats.poops++;
}

function stepDog(dog,dt,owners){
  // movement
  let mvx=0,mvy=0;
  if(dog.id==='you'){
    if(keys['a']||keys['arrowleft']) mvx--;
    if(keys['d']||keys['arrowright'])mvx++;
    if(keys['w']||keys['arrowup'])   mvy--;
    if(keys['s']||keys['arrowdown']) mvy++;
    dog.peeing = !!keys[' '];
  }else{
    aiThink(dog,dt,owners);
    const tgt=dog.ai.target;
    if(tgt){ const dx=tgt.x-dog.x, dy=tgt.y-dog.y, m=Math.hypot(dx,dy)||1;
      if(m>6){ mvx=dx/m; mvy=dy/m; } }
  }

  const mag=Math.hypot(mvx,mvy);
  if(mag>0){ mvx/=mag; mvy/=mag; dog.face=Math.atan2(mvy,mvx); }

  const spd=TUNE.MOVE_SPEED*(dog.vulnerable?TUNE.VULN_SPEED:1);
  dog.x=clamp(dog.x+mvx*spd*dt, MAP_X+12, MAP_X+MAP_PX-12);
  dog.y=clamp(dog.y+mvy*spd*dt, MAP_Y+12, MAP_Y+MAP_PX-12);

  // peeing resolves against nearest in-range object
  if(dog.peeing){
    const {o,d}=nearestObject(dog);
    if(o && d<=TUNE.MARK_RANGE) applyPee(dog,o,dt); else dog.peeing=false;
  }

  // home refuel
  if(dist(dog,HOME)<TUNE.HOME_RADIUS){
    dog.bladder=clamp(dog.bladder+TUNE.WATER_RATE*dt,0,TUNE.BLADDER_MAX);
    dog.foodT+=dt;
    if(dog.foodT>=TUNE.FOOD_TIME && dog.poop<TUNE.POOP_MAX){ dog.poop++; dog.foodT=0; }
  }else dog.foodT=Math.max(0,dog.foodT-dt*0.5);

  // vulnerable: empty (no pee, no poop) standing in enemy-owned turf
  const blk=blockIndexAt(dog.x,dog.y), bo=owners[blk];
  dog.vulnerable = (dog.bladder<=0 && dog.poop<=0 && bo && bo!==dog.id);

  if(dog.id==='you'){
    if(dog.vulnerable) stats.vulnSec+=dt;
    stats.farthest=Math.max(stats.farthest, dist(dog,HOME));
  }
}

function aiThink(dog,dt,owners){
  const ai=dog.ai; ai.think-=dt;
  // forced retreat when nearly empty
  if(dog.bladder<16 && ai.state!=='retreat'){
    ai.state='retreat'; ai.target={x:HOME.x,y:HOME.y};
  }
  if(ai.state==='retreat'){
    if(dist(dog,HOME)<TUNE.HOME_RADIUS && dog.bladder>82){ ai.state='roam'; ai.target=null; }
    return;
  }
  if(ai.think>0 && ai.target) return;
  ai.think=0.3;
  // score every object: prefer enemy/neutral & heavier & closer
  let best=null,bs=-1e9;
  for(const o of objects){
    if(o.lock>0 && o.owner!==dog.id) continue;
    const mineFull = (o.owner===dog.id && o.claim>85);
    if(mineFull) continue;
    const ownF = o.owner===dog.id?0.2 : o.owner===null?1.5 : 2.0;
    const s = o.weight*ownF*40 - dist(dog,o);
    if(s>bs){bs=s;best=o;}
  }
  if(best){ ai.target=best;
    // occasionally drop the trump on a heavy contested object
    if(best.weight>=3 && best.owner && best.owner!==dog.id && dog.poop>0 &&
       dist(dog,best)<TUNE.MARK_RANGE && Math.random()<0.5) tryPoop(dog);
  }
}

function stepWorld(dt){
  const owners=blockOwners();
  // decay + lock countdown (skip decay while locked)
  for(const o of objects){
    if(o.lock>0){ o.lock=Math.max(0,o.lock-dt); continue; }
    if(o.owner){ o.claim-=TUNE.DECAY_RATE*dt; if(o.claim<=0){o.claim=0;o.owner=null; o._contestedBy={};} }
  }
  // retreat counter (you): low bladder while heading home-ish
  for(const dog of dogs) stepDog(dog,dt,owners);
  timeLeft-=dt;
  if(timeLeft<=0){ timeLeft=0; over=true; endRound(); }
}

let lastResult=null;

function endRound(){
  const t=blockTally(blockOwners());
  let win='you',wv=t.you;
  if(t.ai1>wv){win='ai1';wv=t.ai1;} if(t.ai2>wv){win='ai2';wv=t.ai2;}
  const tie = (t.you===wv && win!=='you') || (Object.values(t).filter(v=>v===wv).length>1 && wv>0);
  lastResult={tally:t, win, tie};
  // log for the playtest record
  console.log('=== BIG DOG round ===',
    {blocks:t, you_marks:stats.marks, enemy_contests:stats.enemyContests,
     poops:stats.poops, vulnerable_sec:stats.vulnSec.toFixed(1),
     farthest_px:Math.round(stats.farthest)});
}

// ---- render -----------------------------------------------------------------
function drawDog(d){
  const col=OWNER_COLOR[d.id], r=13;
  // body
  ctx.beginPath(); ctx.arc(d.x,d.y,r,0,7); ctx.fillStyle=col; ctx.fill();
  if(d.id==='you'){ ctx.lineWidth=2.5; ctx.strokeStyle='#fff'; ctx.stroke(); }
  // nose (facing)
  ctx.beginPath();
  ctx.moveTo(d.x+Math.cos(d.face)*r, d.y+Math.sin(d.face)*r);
  ctx.lineTo(d.x+Math.cos(d.face)*(r+9), d.y+Math.sin(d.face)*(r+9));
  ctx.lineWidth=5; ctx.strokeStyle=col; ctx.stroke();
  // vulnerable flash
  if(d.vulnerable && Math.floor(now()*6)%2===0){
    ctx.beginPath(); ctx.arc(d.x,d.y,r+7,0,7); ctx.lineWidth=2;
    ctx.strokeStyle='#fff'; ctx.stroke();
  }
  // pee stream
  if(d.peeing){ const {o,dd}=(()=>{const n=nearestObject(d);return {o:n.o,dd:n.d};})();
    if(o && dist(d,o)<=TUNE.MARK_RANGE){
      ctx.strokeStyle=o.lock>0&&o.owner!==d.id?'#ffffff55':col;
      ctx.lineWidth=3; ctx.setLineDash([2,4]);
      ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(o.x,o.y); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function drawObject(o){
  const R=11;
  // base
  ctx.beginPath(); ctx.arc(o.x,o.y,R,0,7);
  ctx.fillStyle='#454c55'; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='#5a626c'; ctx.stroke();
  // claim ring
  if(o.owner){
    const a=-Math.PI/2, b=a+(o.claim/100)*Math.PI*2;
    ctx.beginPath(); ctx.arc(o.x,o.y,R+4,a,b);
    ctx.lineWidth=4; ctx.strokeStyle=OWNER_COLOR[o.owner]; ctx.stroke();
  }
  // weight dots
  for(let i=0;i<o.weight;i++){
    ctx.beginPath(); ctx.arc(o.x-4+i*4, o.y, 1.4,0,7);
    ctx.fillStyle=o.owner?'#fff':'#aab3bd'; ctx.fill();
  }
  // lock
  if(o.lock>0){
    ctx.beginPath(); ctx.arc(o.x,o.y,R+8,0,7);
    ctx.setLineDash([3,4]); ctx.lineWidth=2;
    ctx.strokeStyle=`rgba(255,255,255,${0.4+0.4*Math.abs(Math.sin(now()*5))})`;
    ctx.stroke(); ctx.setLineDash([]);
  }
}

function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const owners=blockOwners();
  // blocks + ownership tint
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const x=MAP_X+c*BLOCK,y=MAP_Y+r*BLOCK,o=owners[r*3+c];
    ctx.fillStyle=C.street; ctx.fillRect(x,y,BLOCK,BLOCK);
    if(o){ ctx.fillStyle=OWNER_COLOR[o]+'22'; ctx.fillRect(x,y,BLOCK,BLOCK); }
    ctx.strokeStyle=C.grid; ctx.lineWidth=2; ctx.strokeRect(x,y,BLOCK,BLOCK);
  }
  // home zone + doghouse
  ctx.beginPath(); ctx.arc(HOME.x,HOME.y,TUNE.HOME_RADIUS,0,7);
  ctx.fillStyle='#ffffff10'; ctx.fill();
  ctx.setLineDash([5,5]); ctx.strokeStyle='#ffffff44'; ctx.lineWidth=2; ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle=C.home;
  ctx.fillRect(HOME.x-16,HOME.y-6,32,22);
  ctx.beginPath(); ctx.moveTo(HOME.x-20,HOME.y-6); ctx.lineTo(HOME.x,HOME.y-22);
  ctx.lineTo(HOME.x+20,HOME.y-6); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#000'; ctx.fillRect(HOME.x-5,HOME.y+2,10,14);

  for(const o of objects) drawObject(o);
  for(const d of dogs) drawDog(d);
  drawHUD(owners);
  if(over) drawSummary();
  else if(paused) drawCenterMsg('PAUSED','Esc to resume');
}

function bar(x,y,w,h,frac,col,bg='#00000055'){
  ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=col; ctx.fillRect(x,y,w*clamp(frac,0,1),h);
  ctx.strokeStyle='#ffffff33'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
}

function drawHUD(owners){
  const t=blockTally(owners);
  // top strip
  ctx.fillStyle='#1b1f24'; ctx.fillRect(0,0,cv.width,MAP_TOP-4);
  // timer
  const mm=String(Math.floor(timeLeft/60)).padStart(2,'0');
  const ss=String(Math.floor(timeLeft%60)).padStart(2,'0');
  ctx.fillStyle=C.ink; ctx.font='bold 26px ui-monospace,monospace'; ctx.textBaseline='middle';
  ctx.textAlign='left'; ctx.fillText(`${mm}:${ss}`, MAP_X, MAP_TOP/2);
  // block tally chips
  ctx.font='bold 16px ui-monospace,monospace'; ctx.textAlign='center';
  const chips=[['you',t.you],['ai1',t.ai1],['ai2',t.ai2]];
  let cx=cv.width/2-130;
  for(const [k,v] of chips){
    ctx.fillStyle=OWNER_COLOR[k]; ctx.fillRect(cx,MAP_TOP/2-13,86,26);
    ctx.fillStyle='#fff'; ctx.fillText(`${OWNER_NAME[k]} ${v}`, cx+43, MAP_TOP/2);
    cx+=96;
  }
  // bottom strip — player resources
  const you=dogs[0], by=MAP_Y+MAP_PX+16;
  ctx.fillStyle=C.dim; ctx.font='12px ui-monospace,monospace'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('BLADDER', MAP_X, by+8);
  bar(MAP_X+70, by, 220, 16, you.bladder/TUNE.BLADDER_MAX, C.you);
  ctx.fillStyle=C.dim; ctx.fillText('POOP', MAP_X+320, by+8);
  ctx.beginPath(); ctx.arc(MAP_X+378,by+8,8,0,7);
  ctx.fillStyle=you.poop>0?C.home:'#3a414a'; ctx.fill();
  ctx.strokeStyle='#ffffff44'; ctx.lineWidth=1.5; ctx.stroke();
  if(you.vulnerable && Math.floor(now()*5)%2===0){
    ctx.fillStyle='#fff'; ctx.font='bold 15px ui-monospace,monospace'; ctx.textAlign='right';
    ctx.fillText('⚠ VULNERABLE — get home', MAP_X+MAP_PX, by+8);
  }
}

function drawCenterMsg(big,small){
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.font='bold 40px ui-monospace,monospace';
  ctx.fillText(big,cv.width/2,cv.height/2-20);
  ctx.fillStyle=C.dim; ctx.font='16px ui-monospace,monospace';
  ctx.fillText(small,cv.width/2,cv.height/2+22);
}

function drawSummary(){
  ctx.fillStyle='rgba(0,0,0,.72)'; ctx.fillRect(0,0,cv.width,cv.height);
  const r=lastResult, cx=cv.width/2; let y=180;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const head = r.tie?'TIE GAME' : r.win==='you'?'YOU WIN':`${OWNER_NAME[r.win]} WINS`;
  ctx.fillStyle = r.win==='you'?C.you:'#fff'; ctx.font='bold 44px ui-monospace,monospace';
  ctx.fillText('🐕 '+head, cx, y); y+=46;
  ctx.font='18px ui-monospace,monospace'; ctx.fillStyle=C.ink;
  ctx.fillText(`blocks  YOU ${r.tally.you} · RED ${r.tally.ai1} · ORANGE ${r.tally.ai2} · open ${r.tally.null}`,cx,y); y+=44;
  ctx.fillStyle=C.dim; ctx.font='14px ui-monospace,monospace';
  ctx.fillText('— what you did this round —',cx,y); y+=26;
  const lines=[
    `objects fully marked: ${stats.marks}`,
    `enemy turf contested: ${stats.enemyContests}`,
    `power-poops used: ${stats.poops}`,
    `time vulnerable: ${stats.vulnSec.toFixed(1)}s`,
    `farthest push from home: ${Math.round(stats.farthest)}px`,
  ];
  ctx.fillStyle=C.ink;
  for(const L of lines){ ctx.fillText(L,cx,y); y+=24; }
  y+=14; ctx.fillStyle='#fff'; ctx.font='bold 18px ui-monospace,monospace';
  ctx.fillText('press R for one more round', cx, y);
}

// ---- loop / input -----------------------------------------------------------
function frame(){
  const t=now(); let dt=t-lastT; lastT=t; dt=Math.min(dt,0.05);
  if(!paused && !over) stepWorld(dt);
  render();
  requestAnimationFrame(frame);
}

addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
  keys[k]=true;
  if(k==='p' && !paused && !over) tryPoop(dogs[0]);
  if(k==='r') reset();
  if(k==='escape' && !over) paused=!paused;
});

addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

reset(); lastT=now(); requestAnimationFrame(frame);
</script>
</body>
</html>
